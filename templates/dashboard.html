<!DOCTYPE html>
<html>
<head>
    <title>Quant Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background:#0e1117; color:white; font-family:Arial; }
        .box { margin:20px; padding:20px; background:#1a1f2e; border-radius:10px;}
    </style>
</head>

<body>
<h1>Quant Trading Dashboard</h1>

<div class="box">
    <h2>Account</h2>
    <p>Balance: <span id="balance">...</span></p>
    <p>Risk: <span id="risk">...</span></p>
    <p>Running: <span id="running">...</span></p>
</div>

<div class="box">
    <h2>Positions</h2>
    <pre id="positions"></pre>
</div>

<script>
async function update(){
    const r = await fetch("/status");
    const data = await r.json();

    document.getElementById("balance").innerText = data.balance;
    document.getElementById("risk").innerText = data.risk;
    document.getElementById("running").innerText = data.running;
    document.getElementById("positions").innerText =
        JSON.stringify(data.positions, null, 2);
}

setInterval(update, 2000);
update();
</script>

</body>
</html>
